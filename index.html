// LL → NUTS 3 codes (see data/ll_metadata.json)
const LL_NUTS3 = {
  1: ['DE409', 'DE40C'],            // East Brandenburg
  2: ['DE406'],                              // Havelländisches Luch
  3: ['DE734', 'DE737'],                              // N. Hessian Loess Plain
  4: ['DE721', 'DE722', 'DE723', 'DE724', 'DE725'],   // Hessian Low Mtn.
  5: ['DE71D'],                                       // Rheingau
};

// GeoJSON → SVG path helpers
function ringToPath(ring, project) {
  return ring.map((pt, i) => {
    const [x, y] = project(pt[0], pt[1]);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ') + ' Z';
}
function featureToPath(feature, project) {
  const g = feature.geometry;
  if (g.type === 'Polygon') return g.coordinates.map(r => ringToPath(r, project)).join(' ');
  if (g.type === 'MultiPolygon') return g.coordinates.map(p => p.map(r => ringToPath(r, project)).join(' ')).join(' ');
  return '';
}
function walkCoords(coords, cb) {
  if (typeof coords[0] === 'number') { cb(coords[0], coords[1]); return; }
  for (const c of coords) walkCoords(c, cb);
}
function featuresBbox(features) {
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const f of features) walkCoords(f.geometry.coordinates, (x, y) => {
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  });
  return { minX, maxX, minY, maxY };
}
function featuresCentroid(features, project) {
  let sx = 0, sy = 0, n = 0;
  for (const f of features) walkCoords(f.geometry.coordinates, (x, y) => {
    const [px, py] = project(x, y); sx += px; sy += py; n++;
  });
  return [sx / n, sy / n];
}

function Landing({ onPick }) {
  const [hover, setHover] = useState(null);
  const [mapData, setMapData] = useState(null);

  useEffect(() => {
    Promise.all([
      fetch('./data/nuts1_de.geojson').then(r => r.json()),
      fetch('./data/nuts3_ll_simplified.geojson').then(r => r.json()),
    ]).then(([nuts1, nuts3]) => {
      const SVG_W = 420, SVG_H = 560, PAD = 16;
      const bbox = featuresBbox(nuts1.features);
      const cosLat = Math.cos(((bbox.minY + bbox.maxY) / 2) * Math.PI / 180);
      const pMinX = bbox.minX * cosLat;
      const pMaxX = bbox.maxX * cosLat;
      const pMinY = -bbox.maxY;
      const pMaxY = -bbox.minY;
      const dataW = pMaxX - pMinX;
      const dataH = pMaxY - pMinY;
      const scale = Math.min((SVG_W - 2 * PAD) / dataW, (SVG_H - 2 * PAD) / dataH);
      const offsetX = (SVG_W - dataW * scale) / 2;
      const offsetY = (SVG_H - dataH * scale) / 2;
      const project = (lon, lat) => [
        (lon * cosLat - pMinX) * scale + offsetX,
        (-lat - pMinY) * scale + offsetY,
      ];
      const states = nuts1.features.map(f => ({
        id: f.properties.NUTS_ID,
        d: featureToPath(f, project),
      }));
      const llPolys = Object.entries(LL_NUTS3).map(([id, codes]) => {
        const feats = nuts3.features.filter(f => codes.includes(f.properties.NUTS_ID));
        const d = feats.map(f => featureToPath(f, project)).join(' ');
        const [cx, cy] = featuresCentroid(feats, project);
        return { id: parseInt(id, 10), d, cx, cy };
      });
      setMapData({ states, llPolys, viewBox: `0 0 ${SVG_W} ${SVG_H}` });
    }).catch(err => console.error('Failed to load map data:', err));
  }, []);

  return (
    <div style={{ height: 'calc(100vh - 60px)', display: 'flex', flexDirection: 'column', background: C.bg }}>
      <div style={{ padding: '28px 40px 6px', maxWidth: 1100, margin: '0 auto', width: '100%' }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.orange, textTransform: 'uppercase', letterSpacing: '0.14em', marginBottom: 8 }}>Living Labs</div>
        <h1 style={{ fontSize: 36, fontWeight: 900, color: C.teal, lineHeight: 1.05, margin: 0, maxWidth: 720 }}>Five Regions. Real-World Practice.</h1>
        <p style={{ fontSize: 15, color: C.green, marginTop: 10, maxWidth: 680, lineHeight: 1.5 }}>
          In five living labs, we test innovative approaches together with practitioners on the ground.
          Pick a site on the map to explore its conditions, ambitions and progress.
        </p>
      </div>
      <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 24, padding: '18px 40px 40px', maxWidth: 1280, margin: '0 auto', width: '100%', minHeight: 0 }}>

        {/* MAP */}
        <div style={{ borderRadius: 18, padding: 16, position: 'relative', overflow: 'hidden' }}>
          {mapData ? (
            <svg viewBox={mapData.viewBox} style={{ width: '100%', height: '100%', display: 'block' }}>
              {/* NUTS 1 — German states background */}
              {mapData.states.map(s => (
                <path key={s.id} d={s.d} fill={C.surfaceDark} stroke={C.white} strokeWidth="1.2" strokeLinejoin="round" />
              ))}
              {/* NUTS 3 — living lab polygons */}
              {mapData.llPolys.map(llp => {
                const ll = LLS.find(l => l.id === llp.id);
                const icon = LL_ICONS[llp.id - 1];
                const isHover = hover === llp.id;
                return (
                  <g key={llp.id}
                    onMouseEnter={() => setHover(llp.id)}
                    onMouseLeave={() => setHover(null)}
                    onClick={() => onPick(ll)}
                    style={{ cursor: 'pointer' }}>
                    <path d={llp.d}
                      fill={isHover ? ll.color : ll.colorDark}
                      stroke={isHover ? C.mutedPale : 'rgba(255,255,255,0.7)'}
                      strokeWidth={isHover ? 2.5 : 1.2}
                      strokeLinejoin="round"
                      style={{ transition: 'all 0.2s' }} />
                  </g>
                );
              })}
            </svg>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: C.muted, fontSize: 13 }}>Loading map…</div>
          )}
        </div>

        {/* LIST */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto', paddingRight: 4 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.greenMid, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 2 }}>Living Labs</div>
          {LLS.map(l => {
            const icon = LL_ICONS[l.id - 1];
            const isHover = hover === l.id;
            return (
              <div key={l.id}
                onMouseEnter={() => setHover(l.id)}
                onMouseLeave={() => setHover(null)}
                onClick={() => onPick(l)}
                style={{
                  background: C.white, borderRadius: 14,
                  border: `1.5px solid ${isHover ? C.green : C.mutedLight}`,
                  padding: '14px 16px', cursor: 'pointer', transition: 'all 0.15s',
                  display: 'flex', alignItems: 'center', gap: 14,
                  boxShadow: isHover ? '0 4px 16px rgba(34,94,67,0.15)' : 'none',
                  transform: isHover ? 'translateX(2px)' : 'none'
                }}>
                <div style={{ width: 44, height: 44, borderRadius: '50%', background: '#1e5238', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="28" height="28" viewBox={icon.vb} fill="none" dangerouslySetInnerHTML={{__html: icon.paths}} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: C.orange, letterSpacing: '0.08em' }}>{l.region}</div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: C.teal, lineHeight: 1.2, marginTop: 2 }}>{l.name}</div>
                  <div style={{ fontSize: 12, color: C.greenMid, marginTop: 3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{l.tagline}</div>
                </div>
                <div style={{ fontSize: 18, color: isHover ? C.orange : C.muted, transition: 'all 0.15s' }}>→</div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── Top-level app ─────────────────────────────────────── */
const LAYOUT_OPTIONS = [
{ id: 'A', label: 'Option A', sublabel: 'Split Screen', desc: 'Map fixed left · data panel scrolls right' },
{ id: 'B', label: 'Option B', sublabel: 'Stacked', desc: 'Full-width sections · map then data below' }];


function App() {
  const [layout, setLayout] = useState('A');
  const [ll, setLL] = useState(LLS[0]);
  const [view, setView] = useState('landing'); // 'landing' | 'layout'

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Brand top bar ── */}
      <div style={{
        background: 'rgb(249,254,249)',
        padding: '10px 24px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
        flexWrap: 'wrap', rowGap: 8
      }}>
        {/* Logo */}
        <div onClick={() => setView('landing')} style={{ display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0, cursor: 'pointer' }}>
          <svg width="130" height="52" viewBox="0 0 200 80" fill="none" dangerouslySetInnerHTML={{__html: `<path d="M36.327 17.321C34.0625 16.2831 31.5778 16 27.1432 16L7.61178 16.0315L4.34082 23.3911H26.6084C28.1181 23.3911 29.5964 23.4855 30.6972 24.0202C31.7979 24.5548 32.6157 25.5298 32.6157 27.008C32.6157 28.2975 31.9867 30.0588 31.106 32.0717L21.3875 53.899H30.6343L39.4092 34.179C40.9189 30.7822 41.4221 28.2975 41.4221 25.9702C41.4221 21.9443 39.8181 18.925 36.327 17.321Z" fill="#ec4518"/><path d="M57.3988 45.3757H52.3037V68.6498H67.369V63.8378H57.3988V45.3757Z" fill="#ec4518"/><path d="M182.324 16.0315V20.7492H188.615V39.3056H193.71V20.7492H200V16.0315H182.324Z" fill="#ec4518"/><path d="M10.725 60.6297C9.62414 60.095 8.80642 59.12 8.80642 57.6417C8.80642 56.3523 9.43546 54.591 10.3161 52.5781L20.0346 30.7507H10.7878L2.01288 50.4708C0.503232 53.8676 0 56.3523 0 58.6797C0 62.7054 1.60404 65.7248 5.09515 67.3288C7.35965 68.3668 9.84429 68.6498 14.279 68.6498L33.8104 68.6183L37.0813 61.2587H14.8136C13.304 61.2587 11.8258 61.1643 10.725 60.6297Z" fill="#ec4518"/><path d="M127.19 39.683C133.04 39.683 136.814 36.0976 136.814 30.5621V16.0315H131.719V30.2161C131.719 33.0782 130.084 34.7451 127.19 34.7451C124.328 34.7451 122.724 33.1411 122.724 30.2161V16.0315H117.629V30.5621C117.629 36.129 121.372 39.683 127.19 39.683Z" fill="#ec4518"/><path d="M70.0109 34.5879H58.6566L69.5391 20.5919V16.0315H52.4609V20.7492H63.0279L52.3037 34.525V39.3056H70.0109V34.5879Z" fill="#ec4518"/><path d="M77.0878 45.3757L69.2563 68.6498H74.5716L76.069 63.7434H83.9106L85.391 68.6498H90.8006L83.0006 45.3757H77.0878ZM77.3743 59.466L80.012 50.8226L82.62 59.466H77.3743Z" fill="#ec4518"/><path d="M115.679 16.0315H109.672L101.526 27.1653V16.0315H96.4307V39.3056H101.526V34.6822L105.017 30.0814L110.521 39.3056H116.465L108.333 25.7112L115.679 16.0315Z" fill="#ec4518"/><path d="M165.498 39.3056H170.593V30.8451H179.683V26.2532H170.593V20.7492H180.312V16.0315H165.498V39.3056Z" fill="#ec4518"/><path d="M126.089 45.3757H117.283V68.6498H126.404C133.04 68.6498 137.663 63.8692 137.663 57.0757C137.663 50.1563 132.914 45.3757 126.089 45.3757ZM125.9 63.9321H122.378V50.0935H125.586C129.8 50.0935 132.285 52.6725 132.285 57.0757C132.285 61.3845 129.926 63.9321 125.9 63.9321Z" fill="#ec4518"/><path d="M86.932 30.2161C86.932 33.0782 85.2965 34.7451 82.403 34.7451C79.5409 34.7451 77.9369 33.1411 77.9369 30.2161V16.0315H72.8418V30.5621C72.8418 36.129 76.5845 39.683 82.403 39.683C88.253 39.683 92.0272 36.0976 92.0272 30.5621V16.0315H86.932V30.2161Z" fill="#ec4518"/><path d="M107.69 59.8609L98.6632 45.3757H93.002V68.6498H98.0342V53.1553L107.69 68.6498H112.722V45.3757H107.69V59.8609Z" fill="#ec4518"/><path d="M155.905 30.5166L146.879 16.0315H141.217V39.3056H146.25V23.8111L155.905 39.3056H160.937V16.0315H155.905V30.5166Z" fill="#ec4518"/>`}} />
          <div style={{ width: 1, height: 28, background: 'rgba(30,82,56,0.25)' }} />
          <div style={{ color: 'rgb(30,82,56)', fontSize: 15, textTransform: 'uppercase', letterSpacing: '2px', fontWeight: 900 }}>Living Lab Explorer</div>
        </div>
        {/* LL selector */}
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {LLS.map((l) => {
            const icon = LL_ICONS[l.id - 1];
            const active = ll.id === l.id;
            return (
            <button key={l.id} onClick={() => { setLL(l); setView('layout'); }} style={{
              padding: '5px 12px 5px 6px', borderRadius: 40, cursor: 'pointer',
              background: active ? '#34916b' : '#1e5238',
              border: active ? '2px solid #34916b' : '2px solid #1e5238',
              color: C.white,
              fontSize: 12, fontWeight: active ? 800 : 500,
              fontFamily: 'Satoshi,sans-serif', transition: 'all 0.15s', whiteSpace: 'nowrap',
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <svg width="18" height="18" viewBox={icon.vb} fill="none" style={{flexShrink:0}} dangerouslySetInnerHTML={{__html: icon.paths}} />
              {l.nameShort}
            </button>);
          })}
        </div>
      </div>

      {/* ── Layout switcher bar ── */}
      {view !== 'landing' && <div style={{
        background: C.teal,
        padding: '8px 24px',
        display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap'
      }}>
        <span style={{ color: 'rgba(195,233,216,0.6)', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.12em', marginRight: 4 }}>Design option:</span>
        {LAYOUT_OPTIONS.map((o) => {
          const isActive = layout === o.id;
          return (
            <button key={o.id} onClick={() => setLayout(o.id)} style={{
              padding: '6px 16px', borderRadius: 6, cursor: 'pointer',
              background: isActive ? C.orange : 'transparent',
              border: isActive ? 'none' : '1px solid rgba(131,210,175,0.35)',
              color: isActive ? C.white : 'rgba(195,233,216,0.8)',
              fontSize: 12, fontWeight: isActive ? 800 : 500,
              fontFamily: 'Satoshi,sans-serif', transition: 'all 0.15s',
              display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 0
            }}>
              <span style={{ fontSize: 12, fontWeight: 800 }}>{o.label}</span>
              <span style={{ fontSize: 10, opacity: 0.8, fontWeight: 500 }}>{o.sublabel}</span>
            </button>);

        })}
        {layout &&
        <span style={{ fontSize: 11, color: 'rgba(131,210,175,0.65)', marginLeft: 6 }}>
            {LAYOUT_OPTIONS.find((o) => o.id === layout)?.desc}
          </span>
        }
        <div style={{ marginLeft: 'auto', fontSize: 10, color: 'rgba(131,210,175,0.45)', fontStyle: 'italic' }}>
          Wireframe prototype · placeholder data
        </div>
      </div>}

      {/* ── Layout content ── */}
      <div style={{ flex: 1, overflow: 'hidden' }}>
        {view === 'landing'
          ? <Landing onPick={(picked) => { setLL(picked); setView('layout'); }} />
          : layout === 'A'
            ? <LayoutA key={`A-${ll.id}`} ll={ll} />
            : <LayoutB key={`B-${ll.id}`} ll={ll} />}
      </div>

      <style>{`
        @keyframes bounce {
          0%,100% { transform: translateX(-50%) translateY(0); opacity:0.45; }
          50% { transform: translateX(-50%) translateY(5px); opacity:0.7; }
        }
      `}</style>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
