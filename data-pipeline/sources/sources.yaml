version: 1

defaults:
  target_crs: "EPSG:3857"
  tile_size: 512
  resampling: nearest
  clip_buffer_m: 2000
  clip_to: data/nuts3_ll.geojson
  min_zoom: 6
  max_zoom: 12

layers:
  - id: landuse-croptypes
    app_layer: landuse
    kind: raster
    classification: categorical
    title:
      en: "Crop types (DLR, 2024)"
      de: "Anbaukulturen (DLR, 2024)"
    description:
      en: "Annual 10 m crop-type map for Germany derived from Sentinel-1/2 and LPIS with Random Forest."
      de: "Jaehrliche 10-m-Anbaukulturkarte fuer Deutschland aus Sentinel-1/2 und LPIS mit Random Forest."
    source:
      provider: "German Aerospace Center (DLR)"
      dataset: "CROPTYPES_DE_P1Y (2024 edition)"
      url: "https://geoservice.dlr.de/web/datasets/croptypes_de"
      stac: "https://geoservice.dlr.de/eoc/ogc/stac/v1/collections/CROPTYPES_DE_P1Y"
      download_index: "https://download.geoservice.dlr.de/CROPTYPES/files/"
      license: "CC-BY-4.0"
      attribution: "(c) DLR (2024), CC BY 4.0"
      citation: "Asam et al. 2022"
    input:
      path: data/croptypes_2024.tif
      download_url: "https://download.geoservice.dlr.de/CROPTYPES/files/croptypes_2024.tif"
      sha256: null
      crs: "EPSG:4326"
      resolution_m: 10
      nodata: 0
    build:
      script: python/build_pmtiles.py
      target_crs: "EPSG:3857"
      min_zoom: 6
      max_zoom: 12
      tile_size: 512
      resampling: nearest
    output:
      pmtiles: data/pmtiles/landuse-croptypes.pmtiles
      sync_to: app/public/data/pmtiles/landuse-croptypes.pmtiles
    legend:
      - { value: 0, label: { en: "no data", de: "no data" }, color: "#cccccc" }
      - { value: 11, label: { en: "winter wheat", de: "Winterweizen" }, color: "#c2e077" }
      - { value: 12, label: { en: "winter barley", de: "Wintergerste" }, color: "#9bc72d" }
      - { value: 13, label: { en: "winter rye", de: "Winterroggen" }, color: "#5ec597" }
      - { value: 14, label: { en: "other winter cereals", de: "Sonstiges Wintergetreide" }, color: "#359269" }
      - { value: 21, label: { en: "spring wheat", de: "Sommerweizen" }, color: "#225e43" }
      - { value: 22, label: { en: "spring barley", de: "Sommergerste" }, color: "#00b3ad" }
      - { value: 23, label: { en: "spring oat", de: "Sommerhafer" }, color: "#008581" }
      - { value: 30, label: { en: "maize", de: "Mais" }, color: "#005754" }
      - { value: 40, label: { en: "legumes", de: "Bohnen/Lupinen/Erbsen" }, color: "#eb5b25" }
      - { value: 50, label: { en: "potato", de: "Kartoffeln" }, color: "#dc4b14" }
      - { value: 60, label: { en: "sugar beet", de: "Zuckerrueben" }, color: "#bb3f11" }
      - { value: 71, label: { en: "rapeseed", de: "Raps" }, color: "#fce3da" }
      - { value: 81, label: { en: "clover/alfalfa", de: "Klee/Luzerne" }, color: "#83d2af" }
      - { value: 82, label: { en: "arable grass", de: "Ackergras" }, color: "#c3e9d8" }
      - { value: 83, label: { en: "permanent grassland", de: "Gruenland" }, color: "#bce9d2" }
      - { value: 90, label: { en: "vineyard", de: "Wein" }, color: "#e5f5ee" }
      - { value: 100, label: { en: "fruit trees and other woody vegetation", de: "Obst- und Feldgehoelz" }, color: "#8ffffc" }
      - { value: 110, label: { en: "hops", de: "Hopfen" }, color: "#66d1ff" }
      - { value: 111, label: { en: "other agricultural use", de: "Sonstige landwirtschaftliche Nutzung" }, color: "#3da5d9" }

  - id: buek250
    app_layer: soil
    kind: vector
    title:
      en: "Soil overview map (BUEK250)"
      de: "Bodenuebersichtskarte (BUEK250)"
    description:
      en: "General soil map of Germany at 1:250,000 scale, clipped to each living lab."
      de: "Bodenuebersichtskarte Deutschlands im Massstab 1:250.000, je Living Lab zugeschnitten."
    source:
      provider: "Bundesanstalt fuer Geowissenschaften und Rohstoffe (BGR)"
      dataset: "Bodenuebersichtskarte der Bundesrepublik Deutschland 1:250.000 (BUEK250), Version 6.0 mit Gewaesserflaechen"
      url: "https://www.bgr.bund.de/DE/Themen/Boden/Projekte/Flaechen_Rauminformationen_Boden/BUEK250/BUEK250.html"
      doi: "https://doi.org/10.25928/BUEK250_6.0"
      download_url: "https://download.bgr.de/bgr/boden/BUEK250/gpkg/buek250_mgm_utm_v60.zip"
      license: "Nutzungsbestimmungen fuer die Bereitstellung von Geodaten des Bundes (GeoNutzV)"
      attribution: "Datenquelle: BUEK250 V6.0, (c) BGR, Hannover, 2024"
      citation: "BGR (2024): Bodenuebersichtskarte der Bundesrepublik Deutschland 1:250.000 (BUEK250), Hannover. https://doi.org/10.25928/BUEK250_6.0"
    input:
      path: data/buek250_mgm_utm_v60/buek250_mgm_utm_v60.gpkg
      download_url: "https://download.bgr.de/bgr/boden/BUEK250/gpkg/buek250_mgm_utm_v60.zip"
      crs: "EPSG:25832"
    build:
      script: python/build_vector.py
    vector:
      gpkg_layer: buek250_mgm_utm_v60_poly
      keep_fields: [SYM_NR, GEN_ID, BEMERKUNG]
      semantics:
        sqlite_path: data/buek250_mgm_utm_v60/buek250_sachdatenbank_v10.sqlite
        contract_version: buek250-soil-semantics-v1
        tables:
          legend: buek250_Legendeneinheit__v10_tbl
          general_legend: buek250_GL_Einheit_v10_tbl
          parent_material: buek250_GL_BAGFlaechentyp_v10_tbl
          profile: buek250_Profil__v10_tbl
          horizon: buek250_Horizont__v10_tbl
        fallback_policy:
          sparse_values: Prefer semantic label/group/profile fields and keep GEN_ID, SYM_NR, and BEMERKUNG as provenance-only raw values.
          special_areas: Features without GEN_ID become explicit water_area or special_area records derived from BEMERKUNG.
          translations: English labels come from deterministic normalization rules in data-pipeline/python/soil_semantics.py.
      simplify_tolerance: 0.0005
      coordinate_precision: 0.0001
      output_dir: data/geojson
    output:
      geojson_pattern: "data/geojson/buek250-{slug}.geojson"
